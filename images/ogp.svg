<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <radialGradient id="light" cx="30%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#fffbec" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#c6b795" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 土壁の背景 -->
  <rect width="1200" height="630" fill="#c6b795"/>
  <rect width="1200" height="630" fill="url(#light)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.06"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#221e18" stroke-opacity="0.18" stroke-width="2"/>

  <!-- アイコン（泪を湛えた目） -->
  <g transform="translate(150,120) scale(0.72)">
    <g fill="none" stroke="#1b1b1b" stroke-width="19" stroke-linecap="round" stroke-linejoin="round">
      <path d="M150 176 Q262 120 380 168"/>
      <path d="M116 300 Q250 196 408 258 Q372 300 344 320"/>
      <path d="M150 322 Q214 392 300 384 Q356 378 392 322"/>
      <circle cx="256" cy="316" r="70" fill="#ffffff"/>
    </g>
    <circle cx="256" cy="316" r="25" fill="#111111"/>
    <path d="M256 388 C262 415 300 452 300 486 A44 44 0 1 1 212 486 C212 452 250 415 256 388 Z" fill="#b9e6f8"/>
  </g>

  <!-- 文字 -->
  <g font-family="'Yu Mincho','游明朝','Hiragino Mincho ProN',serif" fill="#221e18">
    <text x="600" y="300" font-size="150" letter-spacing="14">片泪</text>
    <text x="606" y="356" font-size="40" letter-spacing="16" fill="#a4442f">shimi</text>
    <line x1="606" y1="392" x2="760" y2="392" stroke="#a4442f" stroke-width="2"/>
    <text x="606" y="450" font-size="38" letter-spacing="10">作品集</text>
    <text x="606" y="506" font-size="27" letter-spacing="4" fill="#4a4237">人物画・風景画・デザイン</text>
  </g>

  <!-- 落款 -->
  <g transform="translate(1080,486) rotate(-3)">
    <rect x="-34" y="-34" width="68" height="68" rx="4" fill="#b8402c"/>
    <text x="0" y="9" font-family="'Yu Mincho','游明朝',serif" font-size="26" fill="#fbeee2" text-anchor="middle" letter-spacing="2">片泪</text>
  </g>
</svg>
